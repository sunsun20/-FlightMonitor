<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>航班监控</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f4f8; min-height: 100vh; padding: 24px 16px; }
    .card { background: white; border-radius: 16px; padding: 24px; max-width: 480px; margin: 0 auto 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
    input { width: 100%; padding: 12px 14px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 16px; outline: none; transition: border 0.2s; }
    input:focus { border-color: #4f8ef7; }
    .btn-row { display: flex; gap: 10px; margin-top: 16px; }
    button { flex: 1; padding: 13px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    button:active { opacity: 0.8; }
    .btn-query { background: #4f8ef7; color: white; }
    .btn-monitor { background: #00b894; color: white; }
    .result { margin-top: 20px; }
    .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-bottom: 16px; }
    .status-scheduled { background: #e3f2fd; color: #1565c0; }
    .status-active { background: #e8f5e9; color: #2e7d32; }
    .status-landed { background: #f3e5f5; color: #6a1b9a; }
    .status-cancelled { background: #ffebee; color: #c62828; }
    .status-diverted { background: #fff3e0; color: #e65100; }
    .status-unknown { background: #f5f5f5; color: #757575; }
    .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #888; }
    .info-value { font-weight: 600; color: #333; text-align: right; max-width: 60%; }
    .delay { color: #e53935; }
    .msg { padding: 14px; border-radius: 10px; font-size: 14px; text-align: center; margin-top: 16px; }
    .msg-success { background: #e8f5e9; color: #2e7d32; }
    .msg-error { background: #ffebee; color: #c62828; }
    .monitored-list { margin-top: 8px; }
    .monitored-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    .monitored-item:last-child { border-bottom: none; }
    h2 { font-size: 16px; font-weight: 700; color: #333; margin-bottom: 12px; }
    .empty { color: #aaa; font-size: 14px; text-align: center; padding: 12px 0; }
  </style>
</head>
<body>

<div class="card">
  <h1>✈️ 航班监控</h1>
  <p class="subtitle">查询或监控航班状态，取消/延误时 Telegram 通知</p>

  <div style="margin-bottom:14px">
    <label>航班号</label>
    <input id="flight_iata" type="text" placeholder="例如 EK306" />
  </div>
  <div>
    <label>日期</label>
    <input id="flight_date" type="date" />
  </div>

  <div class="btn-row">
    <button class="btn-query" onclick="queryFlight()">查询状态</button>
    <button class="btn-monitor" onclick="monitorFlight()">开始监控</button>
  </div>

  <div id="result" class="result"></div>
</div>

<div class="card" id="monitored-card">
  <h2>📡 监控中的航班</h2>
  <div id="monitored-list" class="monitored-list"><p class="empty">暂无监控航班</p></div>
</div>

<script>
const STATUS_ZH = {
  scheduled: "正常（计划中）",
  active: "飞行中",
  landed: "已降落",
  cancelled: "已取消",
  incident: "出现事故",
  diverted: "改飞其他机场",
  unknown: "未知",
};

function formatTime(iso) {
  if (!iso) return "-";
  return iso.replace("T", " ").slice(0, 16);
}

async function queryFlight() {
  const flight_iata = document.getElementById("flight_iata").value.trim();
  const flight_date = document.getElementById("flight_date").value.trim();
  const el = document.getElementById("result");
  if (!flight_iata || !flight_date) {
    el.innerHTML = '<div class="msg msg-error">请填写航班号和日期</div>';
    return;
  }
  el.innerHTML = '<div class="msg" style="background:#f5f5f5;color:#888">查询中...</div>';
  const resp = await fetch("/api/query", {
    method: "POST", headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ flight_iata, flight_date })
  });
  const data = await resp.json();
  if (data.error) {
    el.innerHTML = `<div class="msg msg-error">${data.error}</div>`;
    return;
  }
  const statusClass = `status-${data.status || "unknown"}`;
  const zh = STATUS_ZH[data.status] || data.status;
  el.innerHTML = `
    <span class="status-badge ${statusClass}">${zh}</span>
    <div class="info-row"><span class="info-label">航班</span><span class="info-value">${data.flight_iata}</span></div>
    <div class="info-row"><span class="info-label">航空公司</span><span class="info-value">${data.airline || "-"}</span></div>
    <div class="info-row"><span class="info-label">出发机场</span><span class="info-value">${data.departure_airport || "-"}</span></div>
    <div class="info-row"><span class="info-label">计划起飞</span><span class="info-value">${formatTime(data.departure_scheduled)}</span></div>
    ${data.departure_delay ? `<div class="info-row"><span class="info-label">延误</span><span class="info-value delay">${data.departure_delay} 分钟</span></div>` : ""}
    <div class="info-row"><span class="info-label">到达机场</span><span class="info-value">${data.arrival_airport || "-"}</span></div>
    <div class="info-row"><span class="info-label">计划到达</span><span class="info-value">${formatTime(data.arrival_scheduled)}</span></div>
  `;
}

async function monitorFlight() {
  const flight_iata = document.getElementById("flight_iata").value.trim();
  const flight_date = document.getElementById("flight_date").value.trim();
  const el = document.getElementById("result");
  if (!flight_iata || !flight_date) {
    el.innerHTML = '<div class="msg msg-error">请填写航班号和日期</div>';
    return;
  }
  el.innerHTML = '<div class="msg" style="background:#f5f5f5;color:#888">设置监控中...</div>';
  const resp = await fetch("/api/monitor", {
    method: "POST", headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ flight_iata, flight_date })
  });
  const data = await resp.json();
  if (data.error) {
    el.innerHTML = `<div class="msg msg-error">${data.error}</div>`;
  } else {
    el.innerHTML = `<div class="msg msg-success">${data.message}</div>`;
    loadMonitored();
  }
}

async function loadMonitored() {
  const resp = await fetch("/api/monitored");
  const data = await resp.json();
  const el = document.getElementById("monitored-list");
  const keys = Object.keys(data);
  if (keys.length === 0) {
    el.innerHTML = '<p class="empty">暂无监控航班</p>';
    return;
  }
  el.innerHTML = keys.map(key => {
    const [iata, date] = key.split("_");
    const zh = STATUS_ZH[data[key]] || data[key];
    const statusClass = `status-${data[key] || "unknown"}`;
    return `<div class="monitored-item">
      <span><b>${iata}</b> &nbsp;${date}</span>
      <span class="status-badge ${statusClass}" style="font-size:12px">${zh}</span>
    </div>`;
  }).join("");
}

// 设置默认日期为今天
document.getElementById("flight_date").value = new Date().toISOString().slice(0, 10);
loadMonitored();
setInterval(loadMonitored, 30000);
</script>
</body>
</html>
